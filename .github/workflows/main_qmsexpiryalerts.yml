# Deploy Python Azure Function (Flex Consumption) via remote build.
# Flex Consumption + Python requires a remote build so dependencies in
# requirements.txt are installed on a matching Linux/Python image.

name: Build and deploy Python project to Azure Function App - qmsexpiryalerts

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # project root (contains function_app.py, host.json, requirements.txt)

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for the federated (OIDC) Azure login
      contents: read    # required for actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_13BCA0D2E8C242E0B003DE63B520F70C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_55820C51F82C483997343528CCAAC348 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B59314A988BB439E91B9C885168F00B4 }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        with:
          app-name: 'qmsexpiryalerts'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          sku: 'flexconsumption'
          remote-build: true
